name: Tech Daily Digest

on:
  schedule:
    # UTC 22:10 = 北京时间 6:10 AM
    - cron: '10 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright lunar_python
          playwright install chromium
          playwright install-deps chromium

      - name: Run digest script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          NEWSNOW_BASE_URL: ${{ secrets.NEWSNOW_BASE_URL }}
          DISABLE_COVER_IMAGE: ${{ secrets.DISABLE_COVER_IMAGE }}
        run: python digest.py
